<style>
  :root{
    --bg:#F6F6F4;
    --surface:#FFFFFF;
    --ink:#161616;
    --ink-soft:#4A4642;
    --wood:#E3421F;
    --wood-dark:#161616;
    --felt:#E3421F;
    --felt-dark:#B8331A;
    --brass:#B8331A;
    --brass-light:#FFFFFF;
    --wine:#7A2E2E;
    --line:#E5E1D8;
    --muted:#9A9186;
    --tint:#FDECE6;
    --font-display:'Poppins', sans-serif;
    --font-body:'Nunito', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.5; touch-action:manipulation; overscroll-behavior-y:contain;}
  button{font:inherit;}
  a{color:inherit;}
  *:focus-visible{outline:2px solid var(--felt); outline-offset:2px;}

  .app-header{
    position:sticky; top:0; z-index:800;
    background:var(--ink);
    border-bottom:4px solid var(--wood);
    padding:14px 18px;
    padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;
    align-items:center;
    gap:12px;
    min-height:78px;
    box-sizing:border-box;
  }
  .header-brand{display:flex; flex-direction:column; gap:2px; background:none; border:none; padding:0; margin:0; text-align:left; cursor:pointer; font:inherit;}
  .brand-logo{height:46px; width:auto; display:block;}
  .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;}
  .header-back-btn{background:none; border:none; padding:6px; margin:0 0 0 -6px; cursor:pointer; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; height:38px; box-sizing:border-box;}
  .header-back-btn svg{width:26px; height:26px; display:block;}
  .header-title{font-family:var(--font-display); font-size:19px; font-weight:700; margin:0; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; height:38px; line-height:38px; box-sizing:border-box;}

  .container{max-width:640px; margin:0 auto; padding:24px 16px 100px; transition:transform 0.25s ease;}
  .container.pull-dragging{transition:none;}

  .pull-refresh-indicator{
    position:fixed; top:66px; left:50%; z-index:850;
    width:36px; height:36px; border-radius:50%;
    background:var(--surface); border:2px solid var(--ink); box-shadow:2px 2px 0 var(--ink);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:translateX(-50%) translateY(-40px) rotate(0deg);
    color:var(--felt); pointer-events:none;
  }
  .pull-refresh-indicator svg{width:18px; height:18px; display:block;}
  .pull-refresh-indicator.ready{color:var(--felt-dark);}
  .pull-refresh-indicator.spinning svg{animation:pull-spin .7s linear infinite;}
  @keyframes pull-spin{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}

  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:900;
    display:flex; background:var(--surface); border-top:3px solid var(--ink);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .bottom-nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; padding:6px 4px; cursor:pointer;
    color:var(--muted); font-family:var(--font-body); font-size:11px; font-weight:700;
  }
  .bottom-nav-item svg{width:22px; height:22px; display:block;}

  .update-banner{
    position:fixed; top:0; left:0; right:0; z-index:1100;
    display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;
    background:var(--felt); color:#fff; padding:10px 16px;
    padding-top:calc(10px + env(safe-area-inset-top));
    font-size:14px; font-weight:700;
  }
  .update-banner[hidden]{display:none;}
  .update-banner button{
    background:#fff; color:var(--felt-dark); border:none; padding:6px 14px; border-radius:6px;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .bottom-nav-item.active{color:var(--felt);}

  .loading{padding:60px 20px; text-align:center; font-family:var(--font-mono); color:var(--ink-soft);}

  .card{
    background:var(--surface);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:16px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  .section-title{font-family:var(--font-display); font-size:21px; margin:0 0 12px; font-weight:700; letter-spacing:-0.01em;}
  .settings-header-row{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px;}
  .settings-menu-list{display:flex; flex-direction:column; gap:10px;}
  .settings-menu-item{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1.5px solid var(--line); border-radius:10px;
    padding:10px 14px; font-family:var(--font-body); font-size:16px; font-weight:700; color:var(--ink);
    cursor:pointer;
  }
  .settings-menu-item-icon{
    width:38px; height:38px; border-radius:9px; background:var(--wood); color:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .settings-menu-item-icon svg{width:20px; height:20px; display:block;}
  .settings-menu-item-label{flex:1; text-align:left;}
  .settings-menu-item-chevron{width:18px; height:18px; color:var(--muted); flex-shrink:0;}
  .settings-menu-item:hover{border-color:var(--wood); background:var(--bg);}
  .settings-header-row .section-title{margin-bottom:0;}
  .member-count{font-family:var(--font-body); font-size:15px; font-weight:600; color:var(--muted);}
  .section-title-small{font-family:var(--font-display); font-size:16px; margin:0 0 10px; font-weight:700; letter-spacing:-0.01em;}

  .btn-primary{
    width:100%;
    background:var(--felt); color:#fff; border:2.5px solid var(--ink); padding:13px 20px;
    font-weight:800; font-size:15px; border-radius:10px; cursor:pointer; letter-spacing:0.01em;
    box-shadow:4px 4px 0 var(--ink);
    transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .btn-primary:hover:not(:disabled){background:var(--felt-dark);}
  .btn-primary:active:not(:disabled){transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink);}
  .btn-primary:disabled{opacity:0.45; cursor:not-allowed; box-shadow:none;}

  .btn-text{background:none; border:none; color:var(--brass); text-decoration:underline; cursor:pointer; font-size:14px; padding:0;}
  .btn-text:hover{color:var(--wood-dark);}
  .btn-danger-text{background:none; border:none; color:var(--wine); text-decoration:underline; cursor:pointer; font-size:14px; padding:0;}

  .btn-secondary{
    background:var(--surface); color:var(--ink); border:2px solid var(--ink); padding:10px 18px;
    font-family:var(--font-body); font-weight:700; font-size:14px; border-radius:8px; cursor:pointer;
    box-shadow:2px 2px 0 var(--ink); transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .btn-secondary:hover{background:var(--bg);}
  .btn-secondary:active{transform:translate(2px,2px); box-shadow:0 0 0 var(--ink);}

  .btn-danger{
    background:var(--surface); color:var(--wine); border:2px solid var(--wine); padding:10px 18px;
    font-family:var(--font-body); font-weight:700; font-size:14px; border-radius:8px; cursor:pointer;
    box-shadow:2px 2px 0 var(--wine); transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .btn-danger:hover{background:var(--tint);}
  .btn-danger:active{transform:translate(2px,2px); box-shadow:0 0 0 var(--wine);}

  .empty-state{color:var(--ink-soft); font-size:14px; margin:0;}
  .empty-state-small{color:var(--muted); font-size:13px; font-style:italic; margin:4px 0;}
  .version-footer{color:var(--muted); font-size:11px; font-family:var(--font-mono); text-align:center; padding:4px 12px 22px;}

  .evening-row{display:flex; justify-content:space-between; align-items:center; padding:12px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
  .evening-row:last-child{border-bottom:none;}
  .evening-row:hover .meta{color:var(--felt);}
  .evening-row .date{font-family:var(--font-display); font-size:16px; font-weight:600;}
  .evening-row .meta{font-family:var(--font-mono); font-size:12px; color:var(--muted);}

  .year-group{border-bottom:1px solid var(--line);}
  .year-group:last-child{border-bottom:none;}
  .year-header{display:flex; justify-content:space-between; align-items:center; padding:12px 2px; cursor:pointer; font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--ink);}
  .year-header .chevron{font-family:var(--font-mono); font-size:15px; color:var(--muted); transition:transform 0.18s ease;}
  .year-group.expanded .year-header .chevron{transform:rotate(90deg);}
  .year-evenings{display:none; padding-bottom:6px;}
  .year-group.expanded .year-evenings{display:block;}
  .year-evenings .evening-row{padding-left:10px;}

  label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); display:block; margin-bottom:6px;}
  input[type="text"], input[type="date"], input[type="password"]{
    font-family:var(--font-body); font-size:15px; padding:10px 12px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); width:100%;
    -webkit-appearance:none; appearance:none; box-sizing:border-box; margin:0;
  }
  input[type="date"]{ min-height:44px; }
  input[type="date"]::-webkit-date-and-time-value{ text-align:left; }
  input[type="number"], select{
    font-family:var(--font-body); font-size:15px; padding:10px 12px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); width:100%;
    -webkit-appearance:none; appearance:none; box-sizing:border-box; margin:0 0 12px;
  }
  #new-fine-name{margin-bottom:12px;}

  .form-error{color:var(--wine); font-size:13px; min-height:18px; margin:6px 0;}

  .member-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px dashed var(--line);}
  .fine-row-info{display:flex; align-items:center; gap:10px; min-width:0;}
  .fine-type-icon{width:22px; height:22px; flex-shrink:0; color:var(--brass); display:flex; align-items:center; justify-content:center;}
  .fine-type-icon svg{width:16px; height:16px; display:block;}
  .fine-row-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fine-row-amount{font-family:var(--font-mono); font-weight:700; color:var(--ink-soft); white-space:nowrap;}
  .member-row:last-child{border-bottom:none;}
  .row-actions{display:flex; gap:4px;}
  .nickname-tag{color:var(--brass); font-style:italic; font-weight:400;}
  .icon-btn{background:none; border:none; font-size:15px; cursor:pointer; color:var(--muted); padding:3px 6px; border-radius:3px;}
  .icon-btn:disabled{opacity:0.4; cursor:not-allowed;}
  .edit-member-btn:hover{color:var(--felt); background:var(--line);}
  .delete-member-btn:hover{color:var(--wine); background:var(--line);}
  .confirm-row{display:flex; align-items:center; gap:8px; font-size:13px; flex-wrap:wrap;}

  .member-check-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line); cursor:pointer;}
  .schriftfuehrer-row{border-bottom:none; margin-top:10px;}
  .member-check-row:last-child{border-bottom:none;}
  .member-check-row input[type="checkbox"]{width:18px; height:18px; accent-color:var(--felt); flex-shrink:0;}

  .guest-row{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:8px; margin-bottom:6px;}
  .remove-guest-btn{background:none; border:none; color:var(--wine); cursor:pointer; font-size:15px;}
  .guest-input-row{display:flex; gap:8px; margin-top:8px;}
  .guest-input-row input{flex:1;}
  .btn-icon-add{
    width:44px; height:44px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:var(--surface); color:var(--ink); border:2px solid var(--ink); border-radius:8px;
    font-size:22px; font-weight:800; line-height:1; cursor:pointer; padding:0;
    box-shadow:2px 2px 0 var(--ink); transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .btn-icon-add:hover{background:var(--bg);}
  .btn-icon-add:active{transform:translate(2px,2px); box-shadow:0 0 0 var(--ink);}

  .seat-counter{font-family:var(--font-mono); font-size:13px; padding:9px 12px; border-radius:8px; background:var(--bg); border:1px solid var(--line); display:inline-block; margin-bottom:10px;}
  .seat-counter.over{color:var(--wine); border-color:var(--wine); font-weight:700;}

  .detail-header{position:relative;}
  .detail-header .eyebrow{font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.15em; font-size:11px; color:var(--brass);}
  .delete-icon-btn{position:absolute; top:14px; right:14px; background:none; border:none; padding:6px; cursor:pointer; color:var(--muted); border-radius:6px;}
  .delete-icon-btn svg{width:20px; height:20px; display:block;}
  .delete-icon-btn:hover{color:var(--wine); background:var(--line);}
  .detail-header h2{font-family:var(--font-display); font-size:25px; margin:4px 0; font-weight:700; letter-spacing:-0.01em;}
  .muted{color:var(--muted); font-size:13px; margin:0;}

  .hint{background:var(--tint); border:1px solid var(--brass); color:var(--ink); padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:6px;}

  .seating-diagram{width:100%; height:auto; display:block; max-width:520px; margin:0 auto;}
  @media (prefers-reduced-motion:no-preference){
    .reveal-group{animation:reveal .35s ease backwards;}
  }
  @keyframes reveal{from{opacity:0;} to{opacity:1;}}
  .table-shape{fill:none; stroke:var(--wood-dark); stroke-width:2.5;}
  .lane-center-line{stroke:var(--brass); stroke-width:1.5; stroke-dasharray:6 6; opacity:0.55;}
  .lane-label-text{font-family:var(--font-mono); font-size:21px; font-weight:700; letter-spacing:0.14em; fill:var(--brass);}
  .side-label-text{font-family:var(--font-mono); font-size:20px; font-weight:700; letter-spacing:0.1em; fill:var(--wood-dark);}
  .chair-tick{stroke:var(--wood-dark); stroke-width:1.5;}
  .chair-body{fill:var(--wood); stroke:var(--wood-dark); stroke-width:2.5;}
  .chair-clickable{cursor:pointer;}
  .chair-clickable:hover .chair-body{filter:brightness(1.12);}
  .chair-clickable:hover .name-plate-rect{filter:brightness(0.96);}

  .stat-row{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:8px; margin-bottom:6px;}
  .stat-row .stat-count{font-weight:800; font-family:var(--font-mono);}
  .stat-total{display:flex; justify-content:space-between; font-weight:800; font-size:16px; padding-top:10px; margin-top:6px; border-top:2px solid var(--ink);}
  .chair-body.empty{fill:var(--surface); stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4;}
  .seat-label-text{font-family:var(--font-mono); font-size:21px; font-weight:700; letter-spacing:0.05em; fill:var(--brass-light);}
  .seat-label-text.empty{fill:var(--ink-soft);}
  .name-plate-rect{fill:var(--surface);}
  .name-plate-text{font-family:var(--font-body); font-weight:700; fill:var(--ink);}
  .name-plate-text.empty-text{fill:var(--ink-soft); font-style:italic; font-weight:400;}
  .guest-tag-text{font-family:var(--font-mono); font-size:15px; letter-spacing:0.06em; fill:var(--brass-light); font-weight:700;}

  .confirm-row-buttons{display:flex; gap:10px;}
  .confirm-row-buttons > button{flex:1;}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(22,22,22,0.6);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:1000;
  }
  .modal-card{
    background:var(--surface); border:2.5px solid var(--ink); border-radius:14px;
    padding:22px 20px; max-width:360px; width:100%; box-shadow:6px 6px 0 var(--ink);
  }
  .modal-card h3{font-family:var(--font-display); font-size:19px; margin:0 0 10px; font-weight:700;}
  .modal-card p{margin:0 0 14px; font-size:14px; color:var(--ink-soft);}
</style>
</head>

  // Der Parameter 'shared' bleibt aus Kompatibilitätsgründen im Funktionskopf, wird aber
  // nicht mehr benötigt: es gibt jetzt ohnehin nur noch die eine gemeinsame Datenbank.
  // Verhindert, dass ein hängender Firestore-Aufruf (z.B. bei schlechter Verbindung) die App
  // für immer im Ladezustand stecken lässt - nach STORAGE_TIMEOUT_MS wird abgebrochen.
  const STORAGE_TIMEOUT_MS = 10000;
  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('Zeitüberschreitung')), ms))
    ]);
  }

  async function getJSON(key, shared, fallback){
    try{
      const snap = await withTimeout(getDoc(doc(db, 'kegelbuch', key)), STORAGE_TIMEOUT_MS);
      if(!snap.exists()) return fallback;
      const data = snap.data();
      return JSON.parse(data.value);
    }catch(e){
      console.error('getJSON fehlgeschlagen für', key, e);
      return fallback;
    }
  }
  // Wie getJSON, aber wirft bei Fehler/Timeout weiter statt still den Fallback zu liefern -
  // für Stellen, an denen dem Nutzer eine Fehlermeldung mit "Erneut versuchen" gezeigt werden soll.
  async function getJSONOrThrow(key, fallback){
    const snap = await withTimeout(getDoc(doc(db, 'kegelbuch', key)), STORAGE_TIMEOUT_MS);
    if(!snap.exists()) return fallback;
    const data = snap.data();
    return JSON.parse(data.value);
  }
  async function setJSON(key, value, shared){
    try{
      await withTimeout(setDoc(doc(db, 'kegelbuch', key), { value: JSON.stringify(value) }), STORAGE_TIMEOUT_MS);
      return true;
    }catch(e){
      console.error('setJSON fehlgeschlagen für', key, e);
      return false;
    }
  }
  async function deleteKey(key, shared){
    try{ await withTimeout(deleteDoc(doc(db, 'kegelbuch', key)), STORAGE_TIMEOUT_MS); }catch(e){ console.error('deleteKey fehlgeschlagen für', key, e); }
  }

  // ---------- Kleine Helfer ----------
  function uid(prefix){ return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8); }
  function todayISO(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function formatDateDE(iso){
    const parts = iso.split('-').map(Number);
    const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return `${parts[2]}. ${months[parts[1]-1]} ${parts[0]}`;
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }
  // Erzeugt die Belegungsreihenfolge abwechselnd Kneipe/Saal (bzw. Saal/Kneipe), damit besetzte
  // Plätze nahe der Kegelbahn geclustert bleiben. Welche Seite zuerst drankommt (und bei ungerader
  // Teilnehmerzahl den Überhang bekommt) wird pro Abend zufällig entschieden.
  function buildSeatPriorityOrder(){
    const kneipeStarts = Math.random() < 0.5;
    const order = [];
    for(let i=1;i<=6;i++){
      order.push(kneipeStarts ? 'kneipe-'+i : 'saal-'+i, kneipeStarts ? 'saal-'+i : 'kneipe-'+i);
    }
    return order;
  }

  function historySignature(){
    if(state.view==='detail' && state.currentEveningDetail) return 'detail:'+state.currentEveningDetail.id;
    return state.view;
  }
  function hashFor(sig){
    if(sig==='settingsMenu') return '#einstellungen';
    if(sig==='settings') return '#mitglieder';
    if(sig==='finesManagement') return '#strafen';
    if(sig==='new') return '#neuer-abend';
    if(sig.startsWith('detail:')) return '#abend-'+sig.slice(7);
    return '#uebersicht';
  }

  function render(){
    const app = document.getElementById('app');
    let body = '';
    if(state.view==='main') body = viewMain();
    else if(state.view==='settingsMenu') body = viewSettingsMenu();
    else if(state.view==='settings') body = viewSettings();
    else if(state.view==='finesManagement') body = viewFinesManagement();
    else if(state.view==='new') body = viewNew();
    else if(state.view==='detail') body = viewDetail(state.currentEveningDetail);
    app.innerHTML = headerHtml() + `<main class="container">${body}</main>` + bottomNavHtml();
    attachListeners();

    const sig = historySignature();
    if(!isPopstateNavigation && sig !== lastHistorySignature){
      const method = lastHistorySignature===null ? 'replaceState' : 'pushState';
      history[method]({sig}, '', hashFor(sig));
    }
    lastHistorySignature = sig;
  }

  window.addEventListener('popstate', (event)=>{
    isPopstateNavigation = true;
    const sig = (event.state && event.state.sig) || 'main';
    (async ()=>{
      if(sig==='settingsMenu'){
        goToSettingsMenu();
      }else if(sig==='settings'){
        await goToSettings();
      }else if(sig==='finesManagement'){
        await goToFinesManagement();
      }else if(sig==='new'){
        goToNew();
      }else if(sig.startsWith('detail:')){
        const id = sig.slice(7);
        await openEveningDetail(id);
      }else{
        await goToMain();
      }
      isPopstateNavigation = false;
    })();
  });

  function buildSeatingSVG(detail){
    const W = 760, H = 1020;
    const tableTopY = 130, tableBottomY = 970;
    const topLX = 230, topRX = 530, botLX = 300, botRX = 460;
    const chairW = 188, chairH = 122, outward = 128, n = 6;

    const bySeatId = {};
    detail.seating.forEach(s=>{ bySeatId[s.seatId] = s; });

    function edge(side, t){
      const topX = side==='left' ? topLX : topRX;
      const botX = side==='left' ? botLX : botRX;
      return { x: topX + t*(botX-topX), y: tableTopY + t*(tableBottomY-tableTopY) };
    }

    function chairGroup(seatId, side, idx){
      const t = (idx+0.5)/n;
      const e = edge(side, t);
      const cx = side==='left' ? e.x - outward : e.x + outward;
      const cy = e.y;
      const rectX = cx - chairW/2, rectY = cy - chairH/2;
      const seat = bySeatId[seatId] || { name:null, isGuest:false };
      const empty = !seat.name;
      const shortLabel = seatId.startsWith('saal') ? 'S'+seatId.split('-')[1] : 'K'+seatId.split('-')[1];
      const tickX2 = side==='left' ? rectX+chairW : rectX;
      const nameRaw = empty ? '— frei —' : seat.name;
      const fontSize = nameRaw.length>10 ? 21 : 25;
      const plateWidth = chairW-20;
      const availW = plateWidth-10;
      const estW = nameRaw.length * fontSize * 0.56;
      const textLenAttr = estW>availW ? ` textLength="${availW}" lengthAdjust="spacingAndGlyphs"` : '';
      const plateCenterY = cy+12;
      const clickable = !empty && !seat.isGuest;
      const sfText = '✎ SCHRIFTFÜHRER';
      const sfMaxW = chairW-16;
      const sfEstW = sfText.length * 15 * 0.56;
      const sfTextLenAttr = sfEstW>sfMaxW ? ` textLength="${sfMaxW}" lengthAdjust="spacingAndGlyphs"` : '';
      return `<g class="reveal-group${clickable?' chair-clickable':''}" style="animation-delay:${idx*45}ms"${clickable?` data-member-name="${escapeHtml(seat.name)}"`:''}>
        <line class="chair-tick" x1="${e.x}" y1="${e.y}" x2="${tickX2}" y2="${cy}" />
        <rect class="chair-body${empty?' empty':''}" x="${rectX}" y="${rectY}" width="${chairW}" height="${chairH}" rx="16" />
        <text class="seat-label-text${empty?' empty':''}" x="${cx}" y="${rectY+29}" text-anchor="middle">${shortLabel}</text>
        <rect class="name-plate-rect" x="${cx-plateWidth/2}" y="${plateCenterY-20}" width="${plateWidth}" height="40" rx="6" />
        <text class="name-plate-text${empty?' empty-text':''}" x="${cx}" y="${plateCenterY+9}" text-anchor="middle" font-size="${fontSize}"${textLenAttr}>${escapeHtml(nameRaw)}</text>
        ${(!empty && seat.isGuest) ? `<text class="guest-tag-text" x="${cx}" y="${rectY+chairH-11}" text-anchor="middle">GAST</text>` : ''}
        ${(!empty && seat.isSchriftfuehrer) ? `<text class="guest-tag-text" x="${cx}" y="${rectY+chairH-11}" text-anchor="middle"${sfTextLenAttr}>${sfText}</text>` : ''}
      </g>`;
    }

    let chairsHtml = '';
    for(let i=0;i<n;i++) chairsHtml += chairGroup('saal-'+(i+1), 'left', i);
    for(let i=0;i<n;i++) chairsHtml += chairGroup('kneipe-'+(i+1), 'right', i);

    const tablePath = `M${topLX},${tableTopY} L${topRX},${tableTopY} L${botRX},${tableBottomY} L${botLX},${tableBottomY} Z`;

    return `<svg class="seating-diagram" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sitzplan des Kegelabends">
      <path class="table-shape" d="${tablePath}" />
      <line class="lane-center-line" x1="${W/2}" y1="${tableTopY+15}" x2="${W/2}" y2="${tableBottomY-15}" />
      <text class="lane-label-text" x="${W/2}" y="100" text-anchor="middle">Kegelbahn</text>
      <text class="side-label-text" x="115" y="55" text-anchor="middle">Saal</text>
      <text class="side-label-text" x="${W-115}" y="55" text-anchor="middle">Kneipe</text>
      ${chairsHtml}
    </svg>`;
  }

  async function openEveningDetail(id){
    renderLoading('Kegelabend wird geladen…');
    try{

        state.mainError = 'Konnte diesen Abend nicht laden.';

  function updateSeatCounter(){
    const checkedCount = document.querySelectorAll('.member-checkbox:checked').length;

    if(counterEl){

    const btn = document.getElementById('confirm-btn');
    if(btn) btn.disabled = (total<1 || total>12);
    const err = document.getElementById('form-error');
    if(err) err.textContent = '';

  async function showMemberStatsModal(name){
    showModal(`
      <h3>${escapeHtml(name)}</h3>
      <p class="empty-state">Statistik wird geladen…</p>
    `);
    try{
      const freshIndex = await getJSONOrThrow('evenings-index', state.eveningsIndex);
      const details = await Promise.all(freshIndex.map(e=>getJSON('evening-'+e.id, true, null)));
      const countsByYear = {};
      let total = 0;
      details.forEach(d=>{
        if(!d || !d.seating) return;
        const attended = d.seating.some(s=>!s.isGuest && s.name===name);
        if(attended){
          const year = d.date.slice(0,4);
          countsByYear[year] = (countsByYear[year]||0) + 1;
          total++;
        }
      });
      const years = Object.keys(countsByYear).sort((a,b)=> b.localeCompare(a));
      const rowsHtml = years.length===0
        ? `<p class="empty-state">Keine Anwesenheiten gefunden.</p>`
        : years.map(y=>`<div class="stat-row"><span>${y}</span><span class="stat-count">${countsByYear[y]}×</span></div>`).join('');
      showModal(`
        <h3>${escapeHtml(name)}</h3>
        <p>Anwesenheiten pro Jahr</p>
        ${rowsHtml}
        ${years.length>0 ? `<div class="stat-total"><span>Gesamt</span><span>${total}×</span></div>` : ''}
        <div class="confirm-row-buttons" style="margin-top:14px;">
          <button type="button" class="btn-secondary" id="modal-cancel-btn" style="flex:1;">Schließen</button>
        </div>
      `);
      const closeBtn = document.getElementById('modal-cancel-btn');
      if(closeBtn) closeBtn.addEventListener('click', closeGenericModal);
    }catch(e){
      showModal(`
        <h3>${escapeHtml(name)}</h3>
        <p class="form-error">Verbindung fehlgeschlagen. Bitte prüfe deine Internetverbindung.</p>
        <div class="confirm-row-buttons">
          <button type="button" class="btn-primary" id="stats-retry-btn">Erneut versuchen</button>
          <button type="button" class="btn-secondary" id="modal-cancel-btn">Schließen</button>
        </div>
      `);
      const closeBtn = document.getElementById('modal-cancel-btn');
      if(closeBtn) closeBtn.addEventListener('click', closeGenericModal);
      const retryBtn = document.getElementById('stats-retry-btn');
      if(retryBtn) retryBtn.addEventListener('click', ()=>showMemberStatsModal(name));
    }
  }

  async function handleConfirmNewEvening(){
    const dateInput = document.getElementById('date-input');
    const date = (dateInput && dateInput.value) ? dateInput.value : todayISO();
    const checkedIds = Array.from(document.querySelectorAll('.member-checkbox:checked')).map(cb=>cb.dataset.id);
    const selectedMembers = state.members.filter(m=>checkedIds.includes(m.id));
    const participants = [
      ...selectedMembers.map(m=>({name:displayName(m), isGuest:false})),
      ...currentGuests.map(g=>({name:g.name, isGuest:true}))
    ];
    const errEl = document.getElementById('form-error');
    const btn = document.getElementById('confirm-btn');
    const originalBtnText = btn ? btn.textContent : '';

    // Schnelle, lokale Prüfungen zuerst - kein Netzwerk nötig, keine Ladeanzeige erforderlich.
    if(participants.length<1){ if(errEl) errEl.textContent='Wähle mindestens einen Teilnehmer aus.'; return; }
    if(participants.length>12){ if(errEl) errEl.textContent='Maximal 12 Teilnehmer möglich – es gibt nur 12 Plätze.'; return; }

    // Ab hier braucht es das Netzwerk - sofort sichtbares Feedback geben, damit ein Klick
    // nie so wirkt, als wäre nichts passiert.
    if(errEl) errEl.innerHTML = '';
    if(btn){ btn.disabled = true; btn.textContent = 'Wird geprüft…'; }

    state.eveningsIndex = await getJSON('evenings-index', true, state.eveningsIndex);
    const existing = state.eveningsIndex.find(e=>e.date===date);
    if(existing){
      if(btn){ btn.disabled = false; btn.textContent = originalBtnText; }
      showDuplicateDateModal(date, existing.id);
      return;
    }

    if(btn){ btn.textContent = 'Wird ausgelost…'; }

    const occupiedSeatIds = buildSeatPriorityOrder().slice(0, participants.length);
    const shuffledParticipants = shuffle(participants);
    const seatAssignment = {};
    occupiedSeatIds.forEach((seatId, i)=>{ seatAssignment[seatId] = shuffledParticipants[i]; });

    const schriftfuehrerCheckbox = document.getElementById('schriftfuehrer-checkbox');
    let schriftfuehrerSeatId = null;
    if(schriftfuehrerCheckbox && schriftfuehrerCheckbox.checked){
      const memberSeatIds = occupiedSeatIds.filter((seatId, i)=> !shuffledParticipants[i].isGuest);
      if(memberSeatIds.length>0){
        schriftfuehrerSeatId = memberSeatIds[Math.floor(Math.random()*memberSeatIds.length)];
      }
    }

    const seating = SEATS.map(seat=>{
      const p = seatAssignment[seat.id];
      return {
        seatId:seat.id, section:seat.section, label:seat.label,
        name: p ? p.name : null, isGuest: p ? p.isGuest : false,
        isSchriftfuehrer: seat.id===schriftfuehrerSeatId
      };
    });

    const id = uid('e');
    const detail = { id, date, seating };
    const newIndex = [...state.eveningsIndex, {id, date}];
    await Promise.all([
      setJSON('evening-'+id, detail, true),
      setJSON('evenings-index', newIndex, true)
    ]);
    state.eveningsIndex = newIndex;

    state.currentEveningDetail = detail;
    state.justCreated = true;
    state.view = 'detail';
    render();
  }

  function attachNewListeners(){
    const gotoSettingsLink = document.getElementById('goto-settings-from-new');
    if(gotoSettingsLink) gotoSettingsLink.addEventListener('click', e=>{ e.preventDefault(); goToSettings(); });
    const addGuestBtn = document.getElementById('add-guest-btn');
    if(addGuestBtn) addGuestBtn.addEventListener('click', addGuest);
    const guestInput = document.getElementById('guest-name-input');
    if(guestInput) guestInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addGuest(); } });
    document.querySelectorAll('.member-checkbox').forEach(cb=> cb.addEventListener('change', updateSeatCounter));
    const dateInput = document.getElementById('date-input');
    if(dateInput) dateInput.addEventListener('change', ()=>{ const err = document.getElementById('form-error'); if(err) err.textContent=''; });
    const confirmBtn = document.getElementById('confirm-btn');
    if(confirmBtn) confirmBtn.addEventListener('click', handleConfirmNewEvening);
    renderGuestList();
  }

  function attachDetailListeners(){
    document.querySelectorAll('[data-member-name]').forEach(el=>{
      el.addEventListener('click', ()=>{ showMemberStatsModal(el.dataset.memberName); });
    });
    const delBtn = document.getElementById('delete-evening-btn');
    if(delBtn) delBtn.addEventListener('click', ()=>{ state.confirmDeleteEveningId = state.currentEveningDetail.id; render(); });
    const backdrop = document.getElementById('delete-modal-backdrop');
    if(backdrop) backdrop.addEventListener('click', e=>{ if(e.target===backdrop){ state.confirmDeleteEveningId=null; render(); } });
    const pwInput = document.getElementById('delete-password-input');
    if(pwInput){
      pwInput.focus();
      pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); const yb=document.getElementById('confirm-delete-evening-yes'); if(yb) yb.click(); } });
    }
    const yesBtn = document.getElementById('confirm-delete-evening-yes');
    if(yesBtn) yesBtn.addEventListener('click', async ()=>{
      const pwInputEl = document.getElementById('delete-password-input');
      const pwErrEl = document.getElementById('delete-password-error');
      const entered = pwInputEl ? pwInputEl.value : '';
      if(entered !== DELETE_PASSWORD){
        if(pwErrEl) pwErrEl.textContent = 'Falsches Kennwort.';
        return;
      }
      yesBtn.disabled = true; yesBtn.textContent = 'Löscht…';
      const id = state.currentEveningDetail.id;
      const newIndex = state.eveningsIndex.filter(e=>e.id!==id);
      await Promise.all([
        deleteKey('evening-'+id, true),
        setJSON('evenings-index', newIndex, true)
      ]);
      state.eveningsIndex = newIndex;
      state.confirmDeleteEveningId = null;
      goToMain();
    });
    const noBtn = document.getElementById('confirm-delete-evening-no');
    if(noBtn) noBtn.addEventListener('click', ()=>{ state.confirmDeleteEveningId=null; render(); });
  }

  // ---------- Pull-to-Refresh ----------
  (function setupPullToRefresh(){
    const THRESHOLD = 70;
    const MAX_PULL = 110;
    let startY = null;
    let pulling = false;
    let currentPull = 0;

    function scrollTop(){ return window.scrollY || document.documentElement.scrollTop || 0; }
    function getIndicator(){ return document.getElementById('pull-refresh-indicator'); }
    function getContainer(){ return document.querySelector('main.container'); }

    function updateIndicator(pull){
      const el = getIndicator();
      const container = getContainer();
      const progress = Math.min(pull / THRESHOLD, 1);
      const clamped = Math.min(pull, MAX_PULL);
      if(el){
        el.style.opacity = String(progress);
        el.style.transform = `translateX(-50%) translateY(${clamped-40}px) rotate(${progress*180}deg)`;
        el.classList.toggle('ready', progress>=1);
      }
      if(container) container.style.transform = `translateY(${clamped}px)`;
    }

    function resetIndicator(){
      const el = getIndicator();
      const container = getContainer();
      if(el){ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(-40px) rotate(0deg)'; el.classList.remove('ready','spinning'); }
      if(container){ container.classList.remove('pull-dragging'); container.style.transform=''; }
      currentPull = 0;
    }

    async function doRefresh(){
      const el = getIndicator();
      const container = getContainer();
      if(container){ container.classList.remove('pull-dragging'); container.style.transform = `translateY(${THRESHOLD}px)`; }
      if(el){ el.classList.add('spinning'); el.classList.add('ready'); }
      try{
        if(state.view==='main'){
          const [members, eveningsIndex] = await Promise.all([
            getJSON('members', true, state.members),
            getJSON('evenings-index', true, state.eveningsIndex)
          ]);
          state.members = members;
          state.eveningsIndex = eveningsIndex;
        }else if(state.view==='settings'){
          state.members = await getJSON('members', true, state.members);
        }else if(state.view==='detail' && state.currentEveningDetail){
          const fresh = await getJSON('evening-'+state.currentEveningDetail.id, true, state.currentEveningDetail);
          if(fresh) state.currentEveningDetail = fresh;
        }
        render();
        const newContainer = getContainer();
        if(newContainer){
          newContainer.style.transition = 'none';
          newContainer.style.transform = `translateY(${THRESHOLD}px)`;
          requestAnimationFrame(()=>{
            newContainer.style.transition = '';
            newContainer.style.transform = '';
          });
        }
      } finally {
        resetIndicator();
      }
    }

    document.addEventListener('touchstart', e=>{
      if(scrollTop()>0 || state.view==='new' || document.getElementById('generic-modal-root')){
        pulling = false;
        return;
      }
      startY = e.touches[0].clientY;
      pulling = true;
      const container = getContainer();
      if(container) container.classList.add('pull-dragging');
    }, {passive:true});

    document.addEventListener('touchmove', e=>{
      if(!pulling || startY===null) return;
      const delta = e.touches[0].clientY - startY;
      if(delta<=0 || scrollTop()>0){
        if(currentPull>0) resetIndicator();
        return;
      }
      e.preventDefault();
      currentPull = delta * 0.5;
      updateIndicator(currentPull);
    }, {passive:false});

    document.addEventListener('touchend', ()=>{
      if(!pulling){ startY=null; return; }
      pulling = false;
      startY = null;
      if(currentPull >= THRESHOLD){
        doRefresh();
      }else{
        resetIndicator();
      }
    });
  })();

  // ---------- Update-Prüfung ----------
  // Löst gezielt das iOS-Problem, dass zum Home-Bildschirm hinzugefügte Seiten neue
  // Versionen nicht automatisch bemerken: aktiv beim Server nachfragen und den Nutzer informieren.
  let updateAvailable = false;
  async function checkForUpdate(){
    if(updateAvailable) return;
    try{
      const res = await fetch(location.pathname + '?_v=' + Date.now(), { cache: 'no-store' });
      if(!res.ok) return;
      const html = await res.text();
      const match = html.match(/APP_VERSION\s*=\s*'([^']+)'/);
      if(match && match[1] !== APP_VERSION){
        updateAvailable = true;
        const banner = document.getElementById('update-banner');
        if(banner) banner.hidden = false;
      }
    }catch(e){ /* offline o.ä. - einfach ignorieren */ }
  }
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkForUpdate(); });
  window.addEventListener('focus', checkForUpdate);
  window.addEventListener('pageshow', checkForUpdate);
  setInterval(checkForUpdate, 5 * 60 * 1000);

  // ---------- Start ----------
  async function init(){
    document.getElementById('app').innerHTML = `<div class="loading">Die Pudolfs – wird geladen…</div>`;
    const updateBtn = document.getElementById('update-banner-btn');
    if(updateBtn) updateBtn.addEventListener('click', ()=>{ location.reload(); });
    try{
      const [members, eveningsIndex] = await Promise.all([
        getJSONOrThrow('members', []),
        getJSONOrThrow('evenings-index', [])
      ]);
      state.members = members;
      state.eveningsIndex = eveningsIndex;
      state.view = 'main';
      render();
      setTimeout(checkForUpdate, 2000);
    }catch(e){
      state.view = 'main';
      renderError('Verbindung fehlgeschlagen. Bitte prüfe deine Internetverbindung.', init);
    }
  }
  init();
</script>
